# nginx reverse-proxy – runs inside the monolithic container as the single
# public entry point on port 3000.
#
# Routing:
#   /api/v1/*   → Go backend :9090  (HTTP + WebSocket upgrade)
#   /proxy/*    → Go backend :9090  (gateway / proxy routes)
#   /healthz    → Go backend :9090
#   everything  → Next.js    :3001
#
# This allows Coolify/Traefik (or any reverse proxy) to expose a single port
# while WebSocket connections to /api/v1/admin/audit/stream and
# /api/v1/admin/topology/stream are transparently proxied to the backend.

# No 'user' directive – workers inherit the user that started the master
# (UID 65532 / nonroot, set in the Dockerfile). Omitting it avoids an
# attempt to setuid that would fail for a non-root process.

worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    # Write temp files to /tmp so they are writable by the nonroot user.
    client_body_temp_path /tmp/nginx_client_body;
    proxy_temp_path        /tmp/nginx_proxy;
    fastcgi_temp_path      /tmp/nginx_fastcgi;
    uwsgi_temp_path        /tmp/nginx_uwsgi;
    scgi_temp_path         /tmp/nginx_scgi;

    access_log /dev/stdout;
    error_log  /dev/stderr warn;

    # Correctly set the Connection header for WebSocket vs. regular HTTP.
    map $http_upgrade $connection_upgrade {
        default  upgrade;
        ''       keep-alive;
    }

    server {
        listen 3000;

        # ── WebSocket endpoints (hardcoded upgrade) ───────────────────────────
        # Connection and Upgrade are hop-by-hop headers: Traefik (and any other
        # terminating reverse proxy) strips them before forwarding to nginx.
        # The map-based approach therefore yields $connection_upgrade = "keep-alive"
        # and the WebSocket handshake never completes.
        # Solution: explicit location blocks for the two WS endpoints that
        # unconditionally set Connection "upgrade", bypassing the map entirely.
        location = /api/v1/admin/audit/stream {
            proxy_pass         http://127.0.0.1:9090;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    "websocket";
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 0;
            proxy_send_timeout 0;
            proxy_buffering    off;
        }

        location = /api/v1/admin/topology/stream {
            proxy_pass         http://127.0.0.1:9090;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    "websocket";
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 0;
            proxy_send_timeout 0;
            proxy_buffering    off;
        }

        # ── Backend: rest of admin API (regular HTTP) ─────────────────────────
        location /api/v1/ {
            proxy_pass         http://127.0.0.1:9090;
            proxy_http_version 1.1;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Backend: gateway / proxy routes ───────────────────────────────────
        location /proxy/ {
            proxy_pass         http://127.0.0.1:9090;
            proxy_http_version 1.1;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Backend: health check ─────────────────────────────────────────────
        location /healthz {
            proxy_pass http://127.0.0.1:9090;
        }

        # ── Frontend: everything else → Next.js ───────────────────────────────
        location / {
            proxy_pass         http://127.0.0.1:3001;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection $connection_upgrade;
            proxy_set_header   Host       $host;
            proxy_set_header   X-Real-IP  $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
