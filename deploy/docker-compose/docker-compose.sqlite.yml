# ══════════════════════════════════════════════════════════════════════════════
#  JustGate – Docker Compose (SQLite)
#
#  Runs the full stack (frontend + backend) in a single container.
#  SQLite data is persisted in a named Docker volume.  No external database
#  service is required – ideal for single-node / dev installations.
#
#  Quickstart (from the deploy/docker-compose/ directory):
#    1.  cp .env.example .env        # copy and customise – set NEXTAUTH_SECRET
#                                    # and JUST_GATE_BACKEND_JWT_SECRET at minimum
#    2.  docker compose -f docker-compose.sqlite.yml up
#
#  The admin UI will be available at http://localhost:3000
# ══════════════════════════════════════════════════════════════════════════════

services:
  justgate:
    image: ghcr.io/justlabv1/justgate:${JUSTGATE_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:3000"   # host:container – container always listens on 3000
      - "${BACKEND_PORT:-9090}:9090"   # host:container – container always listens on 9090
    volumes:
      - justgate-data:/data
      # Uncomment to mount a custom CA certificate:
      # - ./certs/my-ca.pem:/certs/my-ca.pem:ro
    environment:
      # ── Ports ────────────────────────────────────────────────────
      # Container-internal ports are always fixed at 3000 (nginx entry point),
      # 3001 (Next.js, nginx-internal), and 9090 (backend).
      # FRONTEND_PORT / BACKEND_PORT in .env only change the host-side mapping.
      PORT:                  3001
      BACKEND_PORT:          9090
      JUST_GATE_BACKEND_URL: http://localhost:9090

      # ── Required secrets ─────────────────────────────────────────
      NEXTAUTH_SECRET:              ${NEXTAUTH_SECRET}
      JUST_GATE_BACKEND_JWT_SECRET: ${JUST_GATE_BACKEND_JWT_SECRET}

      # ── Public URL ───────────────────────────────────────────────
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}

      # ── Database ─────────────────────────────────────────────────
      # SQLite file stored in the persistent /data volume.
      # To use a different path change the value and update the volume mount.
      JUST_GATE_DATABASE_URL: sqlite:///data/justgate.db

      # ── Optional ─────────────────────────────────────────────────
      JUSTGATE_INITIAL_ADMIN_EMAIL: ${JUSTGATE_INITIAL_ADMIN_EMAIL:-}
      JUST_GATE_OIDC_ISSUER:        ${JUST_GATE_OIDC_ISSUER:-}
      JUST_GATE_OIDC_CLIENT_ID:     ${JUST_GATE_OIDC_CLIENT_ID:-}
      JUST_GATE_OIDC_CLIENT_SECRET: ${JUST_GATE_OIDC_CLIENT_SECRET:-}
      JUST_GATE_OIDC_NAME:          ${JUST_GATE_OIDC_NAME:-}
      JUST_GATE_REDIS_URL:          ${JUST_GATE_REDIS_URL:-}
      JUST_GATE_EXTRA_CA_FILE:      ${JUST_GATE_EXTRA_CA_FILE:-}      # WebSocket / reverse-proxy: set this when the backend is reachable at a
      # different public URL than the frontend (e.g. a separate subdomain).
      # Leave unset when the reverse proxy routes /api/v1/* to the backend.
      JUST_GATE_PUBLIC_BACKEND_URL: ${JUST_GATE_PUBLIC_BACKEND_URL:-}
volumes:
  justgate-data:
    driver: local
