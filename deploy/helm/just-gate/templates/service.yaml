# ── Service (monolithic mode) ──────────────────────────────────────────────────
{{- if eq .Values.mode "monolithic" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "justgate.fullname" . }}
  labels:
    {{- include "justgate.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "justgate.selectorLabels" . | nindent 4 }}
  ports:
    - name: frontend
      port: {{ .Values.frontend.port }}
      targetPort: frontend
      protocol: TCP
    - name: backend
      port: {{ .Values.backend.port }}
      targetPort: backend
      protocol: TCP
{{- end }}
