# ── Backend Service (microservice mode) ───────────────────────────────────────
{{- if eq .Values.mode "microservice" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "justgate.fullname" . }}-backend
  labels:
    {{- include "justgate.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "justgate.backendSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.port }}
      targetPort: http
      protocol: TCP
{{- end }}
