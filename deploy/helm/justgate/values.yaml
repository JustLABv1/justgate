# ──────────────────────────────────────────────────────────────────────────────
# Deployment mode
#   monolithic   – single pod running both backend + frontend (default)
#   microservice – separate Deployments for backend and frontend
# ──────────────────────────────────────────────────────────────────────────────
mode: monolithic  # monolithic | microservice

nameOverride: ""
fullnameOverride: ""

# ── Images ────────────────────────────────────────────────────────────────────
image:
  # Used in monolithic mode
  monolith:
    repository: justgate
    tag: latest
    pullPolicy: IfNotPresent
  # Used in microservice mode
  backend:
    repository: justgate-backend
    tag: latest
    pullPolicy: IfNotPresent
  frontend:
    repository: justgate-frontend
    tag: latest
    pullPolicy: IfNotPresent

imagePullSecrets: []

replicaCount: 1

# ── Backend configuration ──────────────────────────────────────────────────────
backend:
  port: 9090
  # JWT secret for admin API tokens.
  # Leave empty to have Helm generate one (stored in a Secret).
  jwtSecret: ""  # Header name injected into upstream requests to identify the tenant.
  # Defaults to X-Scope-OrgID (Mimir/Loki/Tempo) but can be any header.  tenantHeaderName: "X-Scope-OrgID"
  # Explicit database URL (overrides auto-computed PostgreSQL DSN).
  # Format: postgresql://user:pass@host:5432/db  OR  sqlite:///data/justgate.db
  databaseUrl: ""

# ── Frontend configuration ─────────────────────────────────────────────────────
frontend:
  port: 3000
  # NextAuth.js secret – leave empty to have Helm generate one.
  nextauthSecret: ""
  # Public base URL of the frontend (e.g. https://justgate.example.com).
  nextauthUrl: ""
  # Override the URL the frontend uses to reach the backend.
  # Defaults to http://localhost:9090 (monolithic) or the backend Service (microservice).
  backendUrl: ""
  localAccountsEnabled: "true"
  localRegistrationEnabled: "true"
  oidc:
    issuer: ""
    clientId: ""
    clientSecret: ""
    name: ""

# ── PostgreSQL (Bitnami subchart) ─────────────────────────────────────────────
# When enabled, the backend is configured to use PostgreSQL automatically.
# Set postgresql.auth.password; the DSN is auto-constructed from these values.
postgresql:
  enabled: true
  auth:
    username: justgate
    # REQUIRED: set a password or use --set postgresql.auth.password=...
    password: ""
    database: justgate
  primary:
    persistence:
      enabled: true
      size: 5Gi

# ── SQLite persistence (monolithic mode, PostgreSQL disabled) ──────────────────
persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi

# ── Custom CA Certificates ────────────────────────────────────────────────────
# Mount additional trusted CA certificates into the pod(s).
# Useful when the OIDC provider uses a self-signed or internal PKI certificate.
# NODE_EXTRA_CA_CERTS is set automatically for the frontend (Next.js / next-auth).
customCAs:
  enabled: false
  # Inline PEM-encoded CA certificate(s).
  # A ConfigMap is created automatically from this content when set.
  certificates: ""
  # Name of an existing ConfigMap with a 'ca-bundle.crt' key.
  # If set, no ConfigMap is created and this one is used directly.
  existingConfigMap: ""
  # Name of an existing Secret whose value is a PEM-encoded CA bundle.
  # Takes precedence over existingConfigMap and certificates when set.
  existingSecret: ""
  # Key inside the Secret that holds the PEM bundle (default: ca-bundle.crt).
  existingSecretKey: "ca-bundle.crt"

# ── Service ───────────────────────────────────────────────────────────────────
service:
  type: ClusterIP

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: justgate.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ── ServiceAccount ────────────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ── Pod settings ──────────────────────────────────────────────────────────────
resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 512Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}
tolerations: []
affinity: {}

podAnnotations: {}
podSecurityContext: {}
securityContext: {}
