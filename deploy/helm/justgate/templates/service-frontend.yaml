# ── Frontend Service (microservice mode) ──────────────────────────────────────
{{- if eq .Values.mode "microservice" }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "justgate.fullname" . }}-frontend
  labels:
    {{- include "justgate.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "justgate.frontendSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.frontend.port }}
      targetPort: http
      protocol: TCP
{{- end }}
