{{- if .Values.ingress.enabled }}
{{- $frontendPort := .Values.frontend.port }}
{{- $backendPort  := .Values.backend.port }}
{{- $mode         := .Values.mode }}
{{- $fullName     := include "justgate.fullname" . }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $fullName }}
  labels:
    {{- include "justgate.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- if eq $mode "microservice" }}
          {{- /* microservice: /proxy/ and admin streams go to the backend service */}}
          - path: /proxy/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-backend
                port:
                  number: {{ $backendPort }}
          - path: /api/v1/
            pathType: Prefix
            backend:
              service:
                name: {{ $fullName }}-backend
                port:
                  number: {{ $backendPort }}
          {{- end }}
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                {{- if eq $mode "monolithic" }}
                {{- /* monolithic: nginx (port 3000) handles /proxy/, /api/v1/* and
                       WebSocket upgrades internally – route everything here. */}}
                name: {{ $fullName }}
                port:
                  number: {{ $frontendPort }}
                {{- else }}
                name: {{ $fullName }}-frontend
                port:
                  number: {{ $frontendPort }}
                {{- end }}
          {{- end }}
    {{- end }}
{{- end }}
