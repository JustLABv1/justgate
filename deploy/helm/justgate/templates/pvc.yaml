# PVC for SQLite data – only rendered when PostgreSQL is disabled and persistence is enabled.
{{- if and (not .Values.postgresql.enabled) .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "justgate.fullname" . }}-data
  labels:
    {{- include "justgate.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  {{- if .Values.persistence.storageClass }}
  storageClassName: {{ .Values.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
