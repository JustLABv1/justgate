# ── Monolithic Deployment ──────────────────────────────────────────────────────
# Runs backend + frontend in a single pod via supervisord.
{{- if eq .Values.mode "monolithic" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "justgate.fullname" . }}
  labels:
    {{- include "justgate.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "justgate.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "justgate.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "justgate.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: justgate
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.monolith.repository }}:{{ .Values.image.monolith.tag }}"
          imagePullPolicy: {{ .Values.image.monolith.pullPolicy }}
          ports:
            - name: backend
              containerPort: {{ .Values.backend.port }}
              protocol: TCP
            - name: frontend
              containerPort: {{ .Values.frontend.port }}
              protocol: TCP
          env:
            {{- include "justgate.backendEnv" . | nindent 12 }}
            {{- include "justgate.frontendEnv" . | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: backend
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: backend
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- if or (and (not .Values.postgresql.enabled) .Values.persistence.enabled) .Values.customCAs.enabled }}
          volumeMounts:
            {{- if and (not .Values.postgresql.enabled) .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
            {{- if .Values.customCAs.enabled }}
            - name: custom-ca-certs
              mountPath: /etc/ssl/custom-ca
              readOnly: true
            {{- end }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if or (and (not .Values.postgresql.enabled) .Values.persistence.enabled) .Values.customCAs.enabled }}
      volumes:
        {{- if and (not .Values.postgresql.enabled) .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "justgate.fullname" . }}-data
        {{- end }}
        {{- if .Values.customCAs.enabled }}
        {{- include "justgate.caVolume" . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
