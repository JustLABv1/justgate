name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-alpha.*"
      - "v*.*.*-beta.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Combined image (backend + frontend) ─────────────────────────────────
      - name: Determine pre-release
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ -(alpha|beta)\. ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "channel=${BASH_REMATCH[1]}" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "channel=stable" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata (combined)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.prerelease.outputs.is_prerelease == 'false' }}
            type=semver,pattern={{major}},enable=${{ steps.prerelease.outputs.is_prerelease == 'false' }}
            type=sha,prefix=sha-

      - name: Build and push (combined)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=combined
          cache-to: type=gha,mode=max,scope=combined

      # ── Backend-only image ──────────────────────────────────────────────────
      - name: Extract metadata (backend)
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.prerelease.outputs.is_prerelease == 'false' }}
            type=semver,pattern={{major}},enable=${{ steps.prerelease.outputs.is_prerelease == 'false' }}
            type=sha,prefix=sha-

      - name: Build and push (backend)
        uses: docker/build-push-action@v6
        with:
          context: ./services/backend
          file: ./services/backend/Dockerfile
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      # ── Frontend-only image ─────────────────────────────────────────────────
      - name: Extract metadata (frontend)
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}},enable=${{ steps.prerelease.outputs.is_prerelease == 'false' }}
            type=semver,pattern={{major}},enable=${{ steps.prerelease.outputs.is_prerelease == 'false' }}
            type=sha,prefix=sha-

      - name: Build and push (frontend)
        uses: docker/build-push-action@v6
        with:
          context: ./services/frontend
          file: ./services/frontend/Dockerfile
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      # ── Helm chart ──────────────────────────────────────────────────────────
      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Package and push Helm chart
        run: |
          CHART_VERSION="${{ github.ref_name }}"
          CHART_VERSION="${CHART_VERSION#v}"
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          sed -i "s/^version:.*/version: ${CHART_VERSION}/" deploy/helm/justgate/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${CHART_VERSION}\"/" deploy/helm/justgate/Chart.yaml

          helm dependency update deploy/helm/justgate
          helm package deploy/helm/justgate --version "${CHART_VERSION}" --app-version "${CHART_VERSION}"
          helm push "justgate-${CHART_VERSION}.tgz" oci://${{ env.REGISTRY }}/${OWNER}/charts

      # ── Changelog & Release ─────────────────────────────────────────────────
      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          CHART_VERSION="${CURRENT_TAG#v}"
          IS_PRERELEASE="${{ steps.prerelease.outputs.is_prerelease }}"
          CHANNEL="${{ steps.prerelease.outputs.channel }}"

          # For pre-releases, find the previous tag of any kind; for stable, only stable tags
          if [ "$IS_PRERELEASE" = "true" ]; then
            PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+' | sed -n '2p')
          else
            PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          fi

          if [ -z "$PREVIOUS_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..HEAD")
          fi

          FEATURES=$(echo "$COMMITS" | grep -E "^- feat" || true)
          FIXES=$(echo "$COMMITS" | grep -E "^- fix" || true)
          CHORES=$(echo "$COMMITS" | grep -E "^- (chore|refactor|docs|style|test|ci|perf|build)" || true)
          OTHERS=$(echo "$COMMITS" | grep -vE "^- (feat|fix|chore|refactor|docs|style|test|ci|perf|build)" || true)

          BODY=""
          if [ -n "$FEATURES" ]; then BODY="${BODY}### Features\n${FEATURES}\n\n"; fi
          if [ -n "$FIXES" ]; then BODY="${BODY}### Bug Fixes\n${FIXES}\n\n"; fi
          if [ -n "$CHORES" ]; then BODY="${BODY}### Chores\n${CHORES}\n\n"; fi
          if [ -n "$OTHERS" ]; then BODY="${BODY}### Other Changes\n${OTHERS}\n\n"; fi

          REGISTRY="${{ env.REGISTRY }}"
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          BODY="${BODY}### Docker Images\n\`\`\`sh\n"
          BODY="${BODY}# Combined (backend + frontend)\n"
          BODY="${BODY}docker pull ${REGISTRY}/${REPO}:${CHART_VERSION}\n\n"
          BODY="${BODY}# Backend only\n"
          BODY="${BODY}docker pull ${REGISTRY}/${REPO}-backend:${CHART_VERSION}\n\n"
          BODY="${BODY}# Frontend only\n"
          BODY="${BODY}docker pull ${REGISTRY}/${REPO}-frontend:${CHART_VERSION}\n"
          BODY="${BODY}\`\`\`\n\n"
          BODY="${BODY}### Helm Chart\n\`\`\`sh\n"
          BODY="${BODY}helm install justgate oci://${REGISTRY}/${OWNER}/charts/justgate --version ${CHART_VERSION}\n"
          BODY="${BODY}\`\`\`"

          if [ "$IS_PRERELEASE" = "true" ]; then
            BODY="> **${CHANNEL^^} release** — not recommended for production use.\n\n${BODY}"
          fi

          {
            echo "body<<EOF"
            printf "%b" "$BODY"
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "previous_tag=" >> "$GITHUB_OUTPUT"
          else
            echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          make_latest: ${{ steps.prerelease.outputs.is_prerelease == 'false' }}
          generate_release_notes: false
