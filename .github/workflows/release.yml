name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate changelog
        id: changelog
        run: |
          CURRENT_TAG="${{ github.ref_name }}"

          # Vorheriges Tag ermitteln
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')

          if [ -z "$PREVIOUS_TAG" ]; then
            # Erstes Release: alle Commits
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" "${PREVIOUS_TAG}..HEAD")
          fi

          # Commits nach Typ gruppieren
          FEATURES=$(echo "$COMMITS" | grep -E "^- feat" || true)
          FIXES=$(echo "$COMMITS" | grep -E "^- fix" || true)
          CHORES=$(echo "$COMMITS" | grep -E "^- (chore|refactor|docs|style|test|ci|perf|build)" || true)
          OTHERS=$(echo "$COMMITS" | grep -vE "^- (feat|fix|chore|refactor|docs|style|test|ci|perf|build)" || true)

          BODY=""

          if [ -n "$FEATURES" ]; then
            BODY="${BODY}### Features\n${FEATURES}\n\n"
          fi
          if [ -n "$FIXES" ]; then
            BODY="${BODY}### Bug Fixes\n${FIXES}\n\n"
          fi
          if [ -n "$CHORES" ]; then
            BODY="${BODY}### Chores\n${CHORES}\n\n"
          fi
          if [ -n "$OTHERS" ]; then
            BODY="${BODY}### Other Changes\n${OTHERS}\n\n"
          fi

          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -n1)
          BODY="${BODY}### Docker Image\n\`\`\`\ndocker pull ${IMAGE_TAG}\n\`\`\`"

          # Multiline-Output fĂĽr GitHub Actions
          {
            echo "body<<EOF"
            printf "%b" "$BODY"
            echo ""
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          if [ -z "$PREVIOUS_TAG" ]; then
            echo "previous_tag=" >> "$GITHUB_OUTPUT"
          else
            echo "previous_tag=${PREVIOUS_TAG}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          make_latest: true
          generate_release_notes: false
