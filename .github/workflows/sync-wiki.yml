name: Sync Wiki

on:
  push:
    branches:
      - main
    paths:
      - "docs/wiki/**"

jobs:
  sync-wiki:
    name: Sync docs/wiki to GitHub Wiki
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone wiki repository
        run: |
          git clone \
            "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" \
            wiki-repo

      - name: Copy wiki pages
        run: |
          # Copy all markdown files from docs/wiki/ into the wiki repo root
          cp docs/wiki/*.md wiki-repo/

      - name: Commit and push
        working-directory: wiki-repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          if git diff --cached --quiet; then
            echo "No wiki changes to commit."
            exit 0
          fi
          git commit -m "docs: sync wiki from docs/wiki/ [skip ci]"
          git push
